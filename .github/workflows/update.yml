name: update-short-data

on:
  schedule:
    - cron: '0 10 * * 1-5'

  workflow_dispatch:

permissions:
  contents: write

jobs:

  update:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Packages
        run: |
          pip install -r requirements.txt

      - name: Run Collector
        run: |
          python collector/fetch_data.py

      - name: Commit Changes
        run: |
          git config user.name github-actions
          git config user.email actions@github.com

          git add .

          git commit -m "auto update" || echo "no changes"

          git push
