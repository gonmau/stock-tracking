name: 공매도 데이터 수집

on:
  schedule:
    # KST 09:00~16:00, 1시간 간격 (평일만) — UTC 기준
    - cron: '0 0 * * 1-5'   # KST 09:00
    - cron: '0 1 * * 1-5'   # KST 10:00
    - cron: '0 2 * * 1-5'   # KST 11:00
    - cron: '0 3 * * 1-5'   # KST 12:00
    - cron: '0 4 * * 1-5'   # KST 13:00
    - cron: '0 5 * * 1-5'   # KST 14:00
    - cron: '0 6 * * 1-5'   # KST 15:00
    - cron: '0 7 * * 1-5'   # KST 16:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 펄어비스 데이터 수집 (기존)
        run: python collector.py
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}

      - name: 게임주 전종목 데이터 수집
        run: python game_collector.py
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}

      - name: 데이터 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "데이터 업데이트: $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')"
          git push
