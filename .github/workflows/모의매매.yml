name: 모의매매 자동실행

on:
  schedule:
    # 5분마다 (평일 KST 08:00~20:05 = UTC 23:00~11:05)
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 23 * * 0-4'
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 0-10 * * 1-5'
    - cron: '0,5 11 * * 1-5'
  workflow_dispatch:
    inputs:
      force_run:
        description: '강제 실행 (장 시간 무관)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  run-trading:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run 모의매매
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python 모의매매.py

      - name: Commit & Push data
        run: |
          git config user.name "모의매매봇"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "모의매매 $(date '+%Y-%m-%d %H:%M')"
          git push
        continue-on-error: true
